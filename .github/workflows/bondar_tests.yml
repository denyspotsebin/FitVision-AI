name: Automated Tests (Bondar)

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Run Bondar Tests
      run: dotnet test ЛБ3/Bondar/FitVisionTests/FitVisionTests.csproj
